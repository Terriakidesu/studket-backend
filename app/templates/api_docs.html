{% extends "base.html" %}

{% block title %}Studket API Docs{% endblock %}

{% block head %}
<style>
    :root {
        --bg: #f3faf5;
        --ink: #13241b;
        --muted: #587062;
        --line: #d7e7dc;
        --accent: #15803d;
        --accent-soft: #dcfce7;
        --panel: #ffffff;
        --code-bg: #102018;
        --code-ink: #e7fff0;
    }
    html, body {
        min-height: 100%;
    }
    body {
        margin: 0;
        background:
            radial-gradient(circle at top left, rgba(22, 163, 74, 0.12), transparent 28rem),
            linear-gradient(135deg, #fbfefc, var(--bg));
        color: var(--ink);
        font-family: "Segoe UI", sans-serif;
    }
    .docs-shell {
        width: min(1040px, calc(100% - 40px));
        margin: 0 auto;
        padding: 28px 0 56px;
    }
    .docs-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
        padding: 16px 18px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(12px);
        box-shadow: 0 16px 40px rgba(19, 36, 27, 0.06);
    }
    .docs-topbar h1 {
        margin: 0;
        font-size: clamp(1.5rem, 2vw, 2rem);
    }
    .docs-topbar p {
        margin: 4px 0 0;
        color: var(--muted);
    }
    .docs-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }
    .docs-actions a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 12px;
        border: 1px solid var(--line);
        text-decoration: none;
        color: var(--ink);
        background: var(--panel);
        font-weight: 700;
    }
    .docs-actions a.primary {
        background: linear-gradient(135deg, var(--accent), #16a34a);
        border-color: transparent;
        color: #fff;
    }
    .docs-card {
        padding: 28px 30px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 24px 60px rgba(19, 36, 27, 0.08);
    }
    .docs-card h1,
    .docs-card h2,
    .docs-card h3,
    .docs-card h4 {
        line-height: 1.2;
        color: var(--ink);
    }
    .docs-card h1 {
        margin: 0 0 18px;
        font-size: 2rem;
    }
    .docs-card h2 {
        margin: 34px 0 14px;
        padding-top: 10px;
        border-top: 1px solid var(--line);
        font-size: 1.45rem;
    }
    .docs-card h3 {
        margin: 26px 0 10px;
        font-size: 1.12rem;
        color: var(--accent);
    }
    .docs-card p,
    .docs-card li {
        line-height: 1.7;
        color: var(--ink);
    }
    .docs-card ul {
        margin: 10px 0 18px 22px;
        padding: 0;
    }
    .docs-card a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 700;
    }
    .docs-card code {
        padding: 2px 7px;
        border-radius: 8px;
        background: var(--accent-soft);
        color: #14532d;
        font-family: Consolas, "Courier New", monospace;
        font-size: .94em;
    }
    .docs-card pre {
        margin: 14px 0 22px;
        padding: 16px 18px;
        overflow-x: auto;
        border-radius: 16px;
        background: var(--code-bg);
        color: var(--code-ink);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }
    .docs-card pre code {
        padding: 0;
        background: transparent;
        color: inherit;
        border-radius: 0;
    }
    @media (max-width: 720px) {
        .docs-shell {
            width: min(100%, calc(100% - 24px));
            padding: 18px 0 32px;
        }
        .docs-topbar,
        .docs-card {
            padding: 18px;
        }
        .docs-topbar {
            align-items: flex-start;
            flex-direction: column;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="docs-shell">
    <section class="docs-topbar">
        <div>
            <h1>Studket API Docs</h1>
            <p>Rendered from the project API reference and served as an HTML page.</p>
        </div>
        <div class="docs-actions">
            <a href="/">Back Home</a>
            <a href="/docs/llm">LLM Markdown</a>
            <a href="/swagger" class="primary">Open Swagger</a>
        </div>
    </section>

    <article class="docs-card">
        {{ api_reference_html | safe }}
    </article>
</div>
{% endblock %}
