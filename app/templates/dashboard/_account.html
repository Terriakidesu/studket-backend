<article class="panel">
    <h2><i class="fa-solid fa-id-card" style="margin-right:8px;"></i>Account Snapshot</h2>
    <p class="lead">Current web session details.</p>
    <div class="detail-grid">
        <div class="detail-card"><strong>Account ID</strong><br><span class="muted">{{ account.account_id }}</span></div>
        <div class="detail-card"><strong>Email</strong><br><span class="muted">{{ account.email }}</span></div>
        <div class="detail-card"><strong>Role</strong><br><span class="muted">{{ account.account_type }}</span></div>
    </div>
</article>
